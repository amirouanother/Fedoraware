name: Build x64

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Restore NuGet packages
        run: nuget restore Fedoraware\Fedoraware.sln

      - name: Build Release|x64
        shell: pwsh
        run: |
          $msbuild = vswhere -latest -requires Microsoft.Component.MSBuild -find MSBuild\Current\Bin\MSBuild.exe
          if (-not $msbuild) { throw "MSBuild not found" }
          & $msbuild Fedoraware\Fedoraware.sln /p:Configuration=Release /p:Platform=x64 /m

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fedoraware-x64
          path: Fedoraware/bin/Release/x64/*.dll
          if-no-files-found: warn
